- id: mlp-scratch-mnist
  title: "MLP from Scratch — MNIST"
  subtitle: "Réseau multicouche implémenté en NumPy pur"
  themes: [nn]
  level: debutant
  status: proposed
  tech: [Python, NumPy, Matplotlib]
  description: >
    Construction d'un perceptron multicouche (MLP) de zéro avec NumPy :
    forward pass, rétropropagation, descente de gradient.
    Classification des chiffres manuscrits MNIST, visualisation des neurones.
  objectives:
    - "Implémenter la rétropropagation sans framework"
    - "Comprendre les activations, pertes et régularisation"
    - "Atteindre >97% de précision sur MNIST"

- id: cnn-cifar10
  title: "CNN Classification — CIFAR-10"
  subtitle: "Réseau convolutif avec PyTorch"
  themes: [nn]
  level: debutant
  status: proposed
  tech: [Python, PyTorch, Matplotlib]
  description: >
    Conception et entraînement d'un CNN pour la classification d'images CIFAR-10.
    Convolutions, pooling, batch normalization, data augmentation, transfer learning avec ResNet.
  objectives:
    - "Comprendre l'architecture CNN et les convolutions"
    - "Appliquer le transfer learning (ResNet pré-entraîné)"
    - "Analyser les feature maps et erreurs de classification"

- id: lstm-series-temporelles
  title: "LSTM Séries Temporelles"
  subtitle: "Prévision de séries financières ou météo"
  themes: [nn, ml]
  level: intermediaire
  status: proposed
  tech: [Python, PyTorch, Pandas, Scikit-learn]
  description: >
    Modèle LSTM pour la prévision de séries temporelles (prix d'actions ou données météo).
    Fenêtrage temporel, normalisation, évaluation RMSE/MAE, comparaison avec ARIMA.
  objectives:
    - "Préparer des données séquentielles pour le deep learning"
    - "Tuner les hyperparamètres (couches, cellules, dropout)"
    - "Comparer approches statistiques vs deep learning"

- id: autoencoder-anomaly
  title: "Autoencoder — Détection d'Anomalies"
  subtitle: "Détection non supervisée par reconstruction"
  themes: [nn, ml]
  level: intermediaire
  status: proposed
  tech: [Python, PyTorch, Pandas, Scikit-learn, Matplotlib]
  description: >
    Autoencoder convolutif entraîné uniquement sur des données normales.
    Les anomalies sont détectées par seuil sur l'erreur de reconstruction.
    Application sur données industrielles (vibrations, logs réseau).
  objectives:
    - "Comprendre l'espace latent et la compression"
    - "Calibrer le seuil de détection (ROC, F1)"
    - "Comparer avec méthodes classiques (Isolation Forest)"

- id: transformer-scratch
  title: "Transformer from Scratch"
  subtitle: "Implémentation complète du mécanisme d'attention"
  themes: [nn]
  level: avance
  status: proposed
  tech: [Python, PyTorch, NumPy]
  description: >
    Implémentation du Transformer (Vaswani et al. 2017) de zéro : multi-head attention,
    positional encoding, encoder-decoder. Application sur traduction ou classification de texte.
  objectives:
    - "Maîtriser le mécanisme d'attention (scaled dot-product)"
    - "Implémenter l'encodage positionnel et les couches Feed-Forward"
    - "Analyser les têtes d'attention et ce qu'elles apprennent"

- id: gnn-graphes-transport
  title: "GNN — Graphes de Transport"
  subtitle: "Graph Neural Network pour prédiction et optimisation"
  themes: [nn, or]
  level: avance
  status: proposed
  tech: [Python, PyTorch, PyTorch-Geometric, NetworkX]
  description: >
    Réseau de neurones sur graphe (GCN / GraphSAGE) appliqué à un graphe de transport.
    Prédiction de temps de trajet, détection de congestion, aide à la décision pour
    le routage optimal.
  objectives:
    - "Modéliser des données structurées en graphe"
    - "Implémenter la convolution sur graphe (message passing)"
    - "Coupler avec un solveur d'optimisation pour le routage"

