# Projets proposés et réalisés
# themes: rl (RL / Multi-Agent), nn (Réseaux de Neurones), or (Optimisation / OR), ml (Machine Learning)
# level: debutant | intermediaire | avance
# status: done | proposed

# ─────────────────────────────────────────────
#  REINFORCEMENT LEARNING / MULTI-AGENT
# ─────────────────────────────────────────────

- id: gridworld-qlearning
  title: "Gridworld Q-Learning"
  subtitle: "Navigation dans un labyrinthe avec Q-learning tabular"
  themes: [rl]
  level: debutant
  status: proposed
  tech: [Python, NumPy, Matplotlib]
  description: >
    Implémentation from scratch de Q-learning tabular pour apprendre à naviguer dans
    un labyrinthe discret (GridWorld). Politique ε-greedy, convergence de la Q-table,
    visualisation de la politique apprise.
  objectives:
    - "Comprendre les équations de Bellman et la mise à jour Q"
    - "Implémenter la boucle agent-environnement"
    - "Visualiser la convergence de la récompense cumulée"

- id: sarsa-cartpole
  title: "SARSA sur CartPole"
  subtitle: "Équilibrage de perche avec politique ε-greedy"
  themes: [rl]
  level: debutant
  status: proposed
  tech: [Python, Gymnasium, NumPy, Matplotlib]
  description: >
    Utilisation de SARSA (on-policy TD) pour résoudre CartPole-v1 de Gymnasium.
    Discrétisation de l'espace d'état, comparaison SARSA vs Q-learning,
    analyse de la sensibilité aux hyperparamètres (α, γ, ε).
  objectives:
    - "Distinguer on-policy (SARSA) et off-policy (Q-learning)"
    - "Gérer un espace continu par discrétisation"
    - "Comparer les courbes d'apprentissage"

- id: dqn-atari
  title: "Deep Q-Network (DQN)"
  subtitle: "Jeu Atari avec replay memory et réseau cible"
  themes: [rl, nn]
  level: intermediaire
  status: proposed
  tech: [Python, PyTorch, Gymnasium, NumPy]
  description: >
    Implémentation du DQN de DeepMind : réseau neuronal pour approximer Q(s,a),
    experience replay buffer, réseau cible gelé pour la stabilité.
    Application sur Atari Pong ou LunarLander-v2.
  objectives:
    - "Remplacer la Q-table par un réseau de neurones"
    - "Implémenter experience replay et target network"
    - "Analyser les instabilités d'entraînement et les solutions"

- id: predateur-proie-multiagent
  title: "Prédateur-Proie Multi-Agent"
  subtitle: "Coopération émergente avec Q-learning indépendant"
  themes: [rl]
  level: intermediaire
  status: proposed
  tech: [Python, PettingZoo, NumPy, Matplotlib]
  description: >
    Environnement multi-agent où plusieurs prédateurs doivent coopérer pour capturer
    une proie. Q-learning indépendant (IQL) par agent, analyse des stratégies émergentes
    et limites du paradigme indépendant (non-stationnarité).
  objectives:
    - "Modéliser un environnement multi-agent (MARL)"
    - "Observer l'émergence de comportements coopératifs"
    - "Identifier les limites de l'IQL"

- id: maddpg-jeu-competitif
  title: "MADDPG — Jeu Compétitif"
  subtitle: "Multi-Agent Deep Deterministic Policy Gradient"
  themes: [rl, nn]
  level: avance
  status: proposed
  tech: [Python, PyTorch, PettingZoo, NumPy]
  description: >
    Implémentation de MADDPG pour un environnement mixte coopératif-compétitif.
    Chaque agent a un acteur local et un critique centralisé.
    Analyse de la convergence, instabilités et techniques de stabilisation.
  objectives:
    - "Implémenter l'architecture acteur-critique centralisé"
    - "Gérer des espaces d'action continus en multi-agent"
    - "Évaluer les stratégies Nash émergentes"

- id: rl-tsp-pointer-network
  title: "RL pour le TSP — Pointer Network"
  subtitle: "Résolution du Voyageur de Commerce via Reinforcement Learning"
  themes: [rl, nn, or]
  level: avance
  status: proposed
  tech: [Python, PyTorch, NumPy, OR-Tools]
  description: >
    Utilisation d'un Pointer Network (mécanisme d'attention + RL) pour apprendre
    à résoudre le TSP. Comparaison avec les solveurs classiques (OR-Tools, heuristiques).
    Reproduit l'approche Bello et al. 2016.
  objectives:
    - "Combiner apprentissage par renforcement et architecture Transformer"
    - "Généraliser sur des instances de tailles variables"
    - "Comparer qualité de solution vs temps de calcul"

# ─────────────────────────────────────────────
