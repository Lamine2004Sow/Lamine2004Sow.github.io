- id: knapsack-dp-heuristiques
  title: "Knapsack Problem — DP & Heuristiques"
  subtitle: "Sac à dos 0/1 : programmation dynamique et heuristiques"
  themes: [or]
  level: debutant
  status: proposed
  tech: [Python, NumPy, Matplotlib]
  description: >
    Résolution du problème du sac à dos 0/1 par programmation dynamique exacte,
    Branch & Bound, et heuristiques greedy. Comparaison qualité/temps sur instances
    de tailles croissantes.
  objectives:
    - "Implémenter la DP exacte et analyser la complexité"
    - "Comprendre le trade-off qualité de solution / temps de calcul"
    - "Visualiser les frontières de Pareto"

- id: coloration-graphe
  title: "Coloration de Graphe"
  subtitle: "Algorithmes gloutons, backtracking, DSATUR"
  themes: [or]
  level: debutant
  status: proposed
  tech: [Python, NetworkX, Matplotlib]
  description: >
    Implémentation et comparaison d'algorithmes de coloration de graphe : glouton,
    backtracking avec élagage, DSATUR. Application à la planification d'examens
    (éviter les conflits horaires).
  objectives:
    - "Modéliser un problème réel comme un graphe"
    - "Comparer heuristiques déterministes vs exactes"
    - "Analyser le nombre chromatique et ses bornes"

- id: tsp-metaheuristiques
  title: "TSP — Métaheuristiques"
  subtitle: "Voyageur de Commerce : recuit simulé, tabou, génétique"
  themes: [or]
  level: intermediaire
  status: proposed
  tech: [Python, NumPy, Matplotlib, OR-Tools]
  description: >
    Résolution du TSP avec trois métaheuristiques : recuit simulé, recherche tabou,
    algorithme génétique. Benchmarks sur instances TSPlib, comparaison qualité/temps
    et visualisation des tournées.
  objectives:
    - "Implémenter et paramétrer chaque métaheuristique"
    - "Analyser la sensibilité aux paramètres (température, taille population)"
    - "Comparer avec le solveur exact OR-Tools"

- id: scheduling-plne
  title: "Scheduling avec PLNE"
  subtitle: "Ordonnancement d'emploi du temps par programmation linéaire"
  themes: [or]
  level: intermediaire
  status: proposed
  tech: [Python, PuLP, CPLEX, Pandas]
  description: >
    Modélisation et résolution d'un problème d'ordonnancement (emploi du temps étudiant
    ou planning d'équipes) par PLNE avec PuLP/CPLEX. Gestion des contraintes dures et
    molles, analyse de sensibilité.
  objectives:
    - "Formuler un problème réel en PLNE"
    - "Utiliser un solveur (PuLP / CPLEX) et interpréter les résultats"
    - "Identifier les contraintes bottleneck par analyse duale"

- id: ring-star-problem
  title: "Ring-Star Problem — Transport Public"
  subtitle: "Optimisation NP-difficile combinant p-médian et TSP"
  themes: [or, ml]
  level: avance
  status: done
  tech: [Python, NumPy, OR-Tools, Matplotlib]
  description: >
    Modélisation du Ring-Star Problem (RSP) pour l'optimisation de réseaux de transport.
    Heuristiques constructives et d'amélioration itérative, formulation PLNE compacte,
    analyse sur instances TSPlib réelles avec variation du paramètre p.
  objectives:
    - "Modéliser un problème NP-difficile combinant p-médian et TSP"
    - "Implémenter et comparer heuristiques vs PLNE"
    - "Analyser la qualité des solutions sur benchmarks réels"

- id: optimisation-stochastique-ml
  title: "Optimisation Stochastique Guidée par ML"
  subtitle: "Heuristiques intelligentes pour problèmes d'OR sous incertitude"
  themes: [or, ml]
  level: avance
  status: proposed
  tech: [Python, Scikit-learn, PuLP, NumPy, Pandas]
  description: >
    Apprentissage d'une politique de sélection de voisinage pour améliorer les
    heuristiques de recherche locale (Large Neighborhood Search guidé par ML).
    Application à la planification logistique avec demande incertaine.
  objectives:
    - "Entraîner un classifieur pour prédire les bonnes opérations de voisinage"
    - "Intégrer ML dans la boucle d'optimisation"
    - "Évaluer le gain en qualité par rapport aux heuristiques classiques"

